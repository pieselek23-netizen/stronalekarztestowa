<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gabinet Lekarski</title>
    <script type="text/javascript">
      // Ten skrypt przekierowuje błąd 404 do index.html, zachowując ścieżkę w parametrze 'p'
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
