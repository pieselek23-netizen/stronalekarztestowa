    <script type="text/javascript">
      // SKRYPT NAPRAWCZY DLA WOUTER + GITHUB PAGES
      (function( ) {
        var base = '/stronalekarztestowa';
        // Jeśli jesteśmy na roocie domeny, przekieruj do podfolderu
        if (window.location.pathname === '/' || window.location.pathname === '') {
          window.location.replace(base + '/');
        }
        // Nadpisujemy history.pushState, aby zawsze dodawało prefiks projektu
        var originalPushState = history.pushState;
        history.pushState = function(state, title, url) {
          if (url && !url.startsWith(base) && url.startsWith('/')) {
            url = base + url;
          }
          return originalPushState.apply(history, [state, title, url]);
        };
        var originalReplaceState = history.replaceState;
        history.replaceState = function(state, title, url) {
          if (url && !url.startsWith(base) && url.startsWith('/')) {
            url = base + url;
          }
          return originalReplaceState.apply(history, [state, title, url]);
        };
      })();
    </script>
